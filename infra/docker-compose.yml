services:

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64          # ← force Rosetta
    container_name: namenode
    restart: unless-stopped
    ports:
      - "9870:9870"
      - "9000:9000"
    env_file: .env.hadoop
    environment:
      CLUSTER_NAME: hadoop-cluster
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    networks:
      - hadoop-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 5

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: datanode
    restart: unless-stopped
    ports:
      - "9864:9864"
    env_file: .env.hadoop
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - hadoop-net

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: resourcemanager
    restart: unless-stopped
    ports:
      - "8088:8088"
    env_file: .env.hadoop
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - hadoop-net

  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: nodemanager
    restart: unless-stopped
    ports:
      - "8042:8042"
    env_file: .env.hadoop
    depends_on:
      - resourcemanager
    networks:
      - hadoop-net

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: historyserver
    restart: unless-stopped
    ports:
      - "8188:8188"
    env_file: .env.hadoop
    volumes:
      - hadoop_historyserver:/hadoop/yarn/timeline
    depends_on:
      - nodemanager
    networks:
      - hadoop-net

  spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    platform: linux/amd64
    container_name: spark-master
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "7077:7077"
    env_file: .env.hadoop
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_PUBLIC_DNS: localhost
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - hadoop-net

  spark-worker-1:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    platform: linux/amd64
    container_name: spark-worker-1
    restart: unless-stopped
    ports:
      - "8081:8081"
    env_file: .env.hadoop
    environment:
      SPARK_MASTER: spark://spark-master:7077
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_WEBUI_PORT: 8081
      SPARK_PUBLIC_DNS: localhost
    depends_on:
      - spark-master
    networks:
      - hadoop-net

  spark-worker-2:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    platform: linux/amd64
    container_name: spark-worker-2
    restart: unless-stopped
    ports:
      - "8082:8082"
    env_file: .env.hadoop
    environment:
      SPARK_MASTER: spark://spark-master:7077
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_WEBUI_PORT: 8082
      SPARK_PUBLIC_DNS: localhost
    depends_on:
      - spark-master
    networks:
      - hadoop-net

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    container_name: jupyter
    restart: always
    networks:
      - hadoop-net   # le même réseau que spark-master
    ports:
      - 8888:8888
      - 4040:4040
      - 4141:4141
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - SPARK_MASTER=spark://spark-master:7077
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      # JAVA_HOME est défini dynamiquement dans le Dockerfile selon l'architecture
      - PYSPARK_PYTHON=python3
      - SPARK_PUBLIC_DNS=localhost
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=spark
      - POSTGRES_PASSWORD=spark
      - POSTGRES_DB=rne
    volumes:
      - ./notebooks:/home/jovyan/work
    depends_on:
      - spark-master
      - postgres

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5433:5432"   # 5432 occupé par PostgreSQL local → accès hôte sur 5433
    environment:
      POSTGRES_USER: spark
      POSTGRES_PASSWORD: spark
      POSTGRES_DB: rne
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql:ro
    networks:
      - hadoop-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spark -d rne"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Chargement des CSV RNE → PostgreSQL (one-shot) ──────────
  init-db:
    image: python:3.11-slim
    platform: linux/amd64
    container_name: init-db
    restart: "no"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=spark
      - POSTGRES_PASSWORD=spark
      - POSTGRES_DB=rne
      - CSV_DIR=/data/csv
    volumes:
      - ../rep_national_elus:/data/csv:ro
      - ./migrate_csv_to_postgres.py:/app/migrate.py:ro
      - postgres_init_flag:/app/flag
    command: >
      bash -c "pip install --quiet psycopg2-binary pandas sqlalchemy &&
               python /app/migrate.py"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hadoop-net

  # ── Airflow – initialisation (one-shot) ─────────────────────
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-init
    restart: "no"
    env_file: .env.airflow
    environment:
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    command: version
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hadoop-net

  # ── Airflow – Webserver (UI sur http://localhost:8085) ───────
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    restart: unless-stopped
    env_file: .env.airflow
    ports:
      - "8085:8080"
    command: webserver
    volumes:
      - "../dags:/opt/airflow/dags:ro"
      - "../spark_jobs:/opt/airflow/spark_jobs:ro"
      - airflow_logs:/opt/airflow/logs
    depends_on:
      - airflow-init
    networks:
      - hadoop-net
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Airflow – Scheduler ──────────────────────────────────────
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    restart: unless-stopped
    env_file: .env.airflow
    ports:
      - "4041:4040"
    command: scheduler
    volumes:
      - "../dags:/opt/airflow/dags:ro"
      - "../spark_jobs:/opt/airflow/spark_jobs:ro"
      - airflow_logs:/opt/airflow/logs
    depends_on:
      - airflow-webserver
    networks:
      - hadoop-net

volumes:
  hadoop_namenode:
  hadoop_datanode:
  hadoop_historyserver:
  jupyter_packages:
  postgres_data:
  postgres_init_flag:
  airflow_logs:

networks:
  hadoop-net:
    driver: bridge